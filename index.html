<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雙重任務訓練營 - 動身體能學院</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&family=DotGothic16&display=swap" rel="stylesheet">
    
    <!-- Tailwind CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style type="text/css">
      /* Custom Theme Variables and Base Styles */
      :root {
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-display: "Space Grotesk", sans-serif;
        --font-pixel: "DotGothic16", sans-serif;
        
        --color-sport-bg: #111111;
        --color-sport-panel: #1a1a1a;
        --color-sport-orange: #FF6B00;
        --color-sport-yellow: #FFEA00;
        --color-sport-gray: #333333;
      }

      @theme {
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-display: "Space Grotesk", sans-serif;
        --font-pixel: "DotGothic16", sans-serif;
        
        --color-sport-bg: #111111;
        --color-sport-panel: #1a1a1a;
        --color-sport-orange: #FF6B00;
        --color-sport-yellow: #FFEA00;
        --color-sport-gray: #333333;
      }

      body {
        background-color: var(--color-sport-bg);
        color: white;
        font-family: var(--font-sans);
        overflow-x: hidden;
        background-image: 
          linear-gradient(45deg, #151515 25%, transparent 25%), 
          linear-gradient(-45deg, #151515 25%, transparent 25%), 
          linear-gradient(45deg, transparent 75%, #151515 75%), 
          linear-gradient(-45deg, transparent 75%, #151515 75%);
        background-size: 10px 10px;
        min-height: 100vh;
      }

      .sport-bevel {
        position: relative;
        border: 2px solid var(--color-sport-gray);
        background-color: var(--color-sport-panel);
      }

      /* Animation Helpers */
      .fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .fade-out {
        animation: fadeOut 0.3s ease-out forwards;
      }
      .pop-in {
        animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeOut {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-10px); }
      }
      @keyframes popIn {
        from { opacity: 0; scale: 0.8; }
        to { opacity: 1; scale: 1; }
      }

      /* Transitions for game content */
      #game-display-container {
        transition: all 0.3s ease;
      }

      /* Hide sections */
      .hidden {
        display: none !important;
      }

      /* Font classes */
      .font-sans { font-family: var(--font-sans); }
      .font-display { font-family: var(--font-display); }
      .font-pixel { font-family: var(--font-pixel); }

      /* Custom Colors matches */
      .bg-sport-orange { background-color: var(--color-sport-orange); }
      .bg-sport-yellow { background-color: var(--color-sport-yellow); }
      .text-sport-orange { color: var(--color-sport-orange); }
      .text-sport-yellow { color: var(--color-sport-yellow); }
      .border-sport-gray { border-color: var(--color-sport-gray); }

      /* Slider styles */
      input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 12px;
        background: #000;
        border: 1px solid var(--color-sport-gray);
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        border: 2px solid white;
        height: 24px;
        width: 12px;
        background: var(--color-sport-orange);
        cursor: pointer;
        margin-top: -7px;
      }
    </style>
  </head>
  <body>
    <div id="app" class="min-h-screen flex flex-col items-center p-6 w-full max-w-4xl mx-auto relative font-sans">
      <!-- Designer Credit -->
      <div class="fixed bottom-1 right-4 text-[10px] uppercase tracking-widest text-white/30 pointer-events-none z-50 font-sans">
        開發製作：數位互動體驗設計者 儲良均老師
      </div>

      <header class="text-center mb-10">
        <h1 class="text-[22px] sm:text-3xl md:text-6xl font-pixel uppercase tracking-tighter text-white drop-shadow-[3px_3px_0px_#FF6B00] border-4 border-cyan-400 p-2 md:p-4 inline-block whitespace-nowrap">
          雙重任務訓練營
        </h1>
        <p class="mt-4 text-sport-yellow font-display text-sm md:text-xl tracking-[0.3em] font-bold">
          數位教學專業設計
        </p>
      </header>

      <!-- SETUP VIEW -->
      <div id="setup-view" class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
        <!-- Left Column -->
        <div class="space-y-6">
          <!-- Mode Selection -->
          <section class="sport-bevel p-5">
            <h2 class="text-sm font-display text-sport-yellow uppercase mb-4 flex items-center justify-center border-2 border-cyan-400 py-1">
              SELECT MODE / 選擇模式
            </h2>
            <div class="space-y-3" id="mode-buttons">
              <button data-mode="number" class="w-full p-4 text-center font-bold text-xl transition-all duration-200 border-2 bg-sport-orange border-cyan-400 text-white shadow-[0_0_15px_rgba(0,255,255,0.6)]">
                <span class="block">數字挑戰</span>
              </button>
              <button data-mode="color" class="w-full p-4 text-center font-bold text-xl transition-all duration-200 border-2 bg-[#1a1a1a] border-sport-gray text-white">
                <span class="block">顏色辨識挑戰</span>
              </button>
              <button data-mode="shape" class="w-full p-4 text-center font-bold text-xl transition-all duration-200 border-2 bg-[#1a1a1a] border-sport-gray text-white">
                <span class="block">形形色色挑戰</span>
              </button>
            </div>
          </section>

          <!-- Config -->
          <section class="sport-bevel p-5">
            <h2 class="text-xs font-display text-sport-yellow uppercase mb-4 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings-2"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>
              2. 訓練參數
            </h2>
            <div class="space-y-6">
              <div class="flex justify-between items-center">
                <span class="text-sm font-bold flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock text-sport-orange"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  訓練時間
                </span>
                <select id="duration-select" class="bg-black border-2 border-sport-gray text-sport-yellow p-2 font-display outline-none cursor-pointer">
                  <option value="0">無限制 (∞)</option>
                  <option value="60">1 MIN</option>
                  <option value="120">2 MINS</option>
                  <option value="180" selected>3 MINS</option>
                  <option value="240">4 MINS</option>
                  <option value="300">5 MINS</option>
                </select>
              </div>

              <div class="space-y-2">
                <div class="flex justify-between items-center">
                  <span class="text-sm font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap text-sport-orange"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    切換速度
                  </span>
                  <span id="speed-display" class="text-sport-yellow font-display text-lg">4.0 SEC</span>
                </div>
                <input type="range" id="speed-range" min="0.5" max="6.0" step="0.5" value="4.0" class="cursor-pointer">
                <div class="flex justify-between text-[10px] font-bold text-white/40 uppercase">
                  <span>Fast / 快</span>
                  <span>Slow / 慢</span>
                </div>
              </div>

              <div class="space-y-2">
                <div class="flex justify-between items-center">
                  <span class="text-sm font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap text-sport-orange"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    節拍器速度
                  </span>
                  <span id="bpm-display" class="text-sport-yellow font-display text-lg">60 BPM</span>
                </div>
                <input type="range" id="bpm-range" min="40" max="240" step="1" value="60" class="cursor-pointer">
                <div class="flex justify-between text-[10px] font-bold text-white/40 uppercase">
                  <span>Slow / 慢</span>
                  <span>Fast / 快</span>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- Right Column -->
        <div class="space-y-6">
          <!-- Features -->
          <section class="sport-bevel p-5">
            <h2 class="text-xs font-display text-sport-yellow uppercase mb-4 flex items-center gap-2">
              3. 功能設定
            </h2>
            <div class="grid grid-cols-1 gap-4">
              <div class="grid grid-cols-2 gap-4">
                <button id="toggle-bgm" class="p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors bg-green-500 text-black border-white">
                  BGM
                </button>
                <button id="toggle-sfx" class="p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors bg-green-500 text-black border-white">
                  SFX
                </button>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <button id="toggle-metronome" class="p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors bg-sport-gray text-white/50 border-transparent">
                  節拍器: OFF
                </button>
                <button id="toggle-answer" class="p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors bg-sport-yellow text-black border-white">
                  解答: ON
                </button>
              </div>
            </div>
          </section>

          <button id="start-btn" style="background: linear-gradient(to bottom, #FFEA00, #FF6B00);" class="w-full p-6 text-black font-display text-3xl font-bold border-4 border-white shadow-[0_6px_0px_#b34a00,0_10px_20px_rgba(0,0,0,0.5)] active:translate-y-1 active:shadow-[0_2px_0px_#b34a00,0_5px_10px_rgba(0,0,0,0.5)] transition-all">
            <span class="block flex items-center justify-center gap-3">
              遊戲開始
            </span>
          </button>
        </div>
      </div>

      <!-- RUNNING VIEW -->
      <div id="running-view" class="w-full flex flex-col h-full hidden">
        <!-- Instruction Banner -->
        <div id="instruction-banner" class="border-4 border-white p-4 mb-4 relative min-h-[100px] flex items-center bg-sport-orange text-black">
          <div class="pr-24 w-full">
            <div id="instruction-text" class="font-bold text-lg md:text-2xl leading-tight border-2 border-cyan-400 p-2 inline-block w-full">
              <!-- Text populated by JS -->
            </div>
          </div>
          <div id="timer-display" class="absolute -right-2 top-1/2 -translate-y-1/2 bg-black border-4 border-white text-green-400 p-2 font-mono text-2xl md:text-4xl font-bold min-w-[120px] text-center">
            03:00
          </div>
        </div>

        <!-- Answer Popup -->
        <div class="h-10 md:h-14 flex items-center justify-center mb-2">
          <div id="answer-popup" class="hidden bg-white text-black px-6 py-1 font-display text-xl md:text-3xl font-bold border-2 border-sport-yellow shadow-lg z-20 pop-in">
            <!-- Answer text -->
          </div>
        </div>

        <!-- Main Display -->
        <div class="relative w-full aspect-video md:aspect-square max-h-[50vh] bg-black border-4 border-sport-gray flex items-center justify-center mb-4 shadow-[inset_0_0_60px_rgba(255,107,0,0.2)] overflow-hidden">
          <div id="stimulus-content" class="flex items-center justify-center w-full h-full p-8 pop-in">
            <!-- Stimulus content -->
          </div>
        </div>

        <!-- LED Countdown -->
        <div id="led-container" class="flex justify-center gap-2 mb-6 h-8">
          <!-- LEDs generated by JS -->
        </div>

        <button id="stop-btn" class="mx-auto px-16 py-4 bg-black border-4 border-cyan-400 text-red-500 font-display text-3xl font-bold uppercase shadow-[0_0_20px_rgba(0,255,255,0.3)] hover:scale-105 active:scale-95 transition-all">
          <span class="block flex items-center gap-4">
            <div class="w-6 h-6 bg-red-600"></div> STOP
          </span>
        </button>
      </div>
    </div>

    <script>
      // --- Audio Utility ---
      class SportAudio {
        constructor() {
          this.ctx = null;
          this.enabled = true;
        }

        setEnabled(enabled) {
          this.enabled = enabled;
        }

        init() {
          if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (this.ctx.state === 'suspended') {
            this.ctx.resume();
          }
        }

        playTick() {
          if (!this.enabled) return;
          this.init();
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(800, this.ctx.currentTime);
          gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
          osc.start();
          osc.stop(this.ctx.currentTime + 0.03);
        }

        playPop() {
          if (!this.enabled) return;
          this.init();
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          
          osc.type = 'square';
          osc.frequency.setValueAtTime(1000, this.ctx.currentTime);
          gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
          osc.start();
          osc.stop(this.ctx.currentTime + 0.2);
        }
      }

      const audio = new SportAudio();

      // --- Game State ---
      let state = {
        view: 'setup',
        mode: 'number',
        duration: 180,
        speed: 4.0,
        bgmEnabled: true,
        sfxEnabled: true,
        metronomeEnabled: false,
        metronomeBpm: 60,
        showAnswerEnabled: true,
        timeLeft: 180,
        currentStimulus: null,
        prevShape: null,
        timerId: null,
        stepId: null,
        ledIntervalId: null,
        metronomeIntervalId: null
      };

      // --- DOM Elements ---
      const elements = {
        setupView: document.getElementById('setup-view'),
        runningView: document.getElementById('running-view'),
        modeButtons: document.querySelectorAll('#mode-buttons button'),
        durationSelect: document.getElementById('duration-select'),
        speedRange: document.getElementById('speed-range'),
        speedDisplay: document.getElementById('speed-display'),
        bpmRange: document.getElementById('bpm-range'),
        bpmDisplay: document.getElementById('bpm-display'),
        toggleBgm: document.getElementById('toggle-bgm'),
        toggleSfx: document.getElementById('toggle-sfx'),
        toggleMetronome: document.getElementById('toggle-metronome'),
        toggleAnswer: document.getElementById('toggle-answer'),
        startBtn: document.getElementById('start-btn'),
        stopBtn: document.getElementById('stop-btn'),
        instructionBanner: document.getElementById('instruction-banner'),
        instructionText: document.getElementById('instruction-text'),
        timerDisplay: document.getElementById('timer-display'),
        answerPopup: document.getElementById('answer-popup'),
        stimulusContent: document.getElementById('stimulus-content'),
        ledContainer: document.getElementById('led-container')
      };

      // --- Logic ---

      function updateUI() {
        // Mode buttons
        elements.modeButtons.forEach(btn => {
          if (btn.dataset.mode === state.mode) {
            btn.className = "w-full p-4 text-center font-bold text-xl transition-all duration-200 border-2 bg-sport-orange border-cyan-400 text-white shadow-[0_0_15px_rgba(0,255,255,0.6)]";
          } else {
            btn.className = "w-full p-4 text-center font-bold text-xl transition-all duration-200 border-2 bg-[#1a1a1a] border-sport-gray text-white";
          }
        });

        // Config displays
        elements.speedDisplay.textContent = state.speed.toFixed(1) + " SEC";
        elements.bpmDisplay.textContent = state.metronomeBpm + " BPM";

        // Toggle buttons
        elements.toggleBgm.className = `p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors ${state.bgmEnabled ? 'bg-green-500 text-black border-white' : 'bg-sport-gray text-white/50 border-transparent'}`;
        elements.toggleSfx.className = `p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors ${state.sfxEnabled ? 'bg-green-500 text-black border-white' : 'bg-sport-gray text-white/50 border-transparent'}`;
        elements.toggleMetronome.className = `p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors ${state.metronomeEnabled ? 'bg-cyan-500 text-black border-white' : 'bg-sport-gray text-white/50 border-transparent'}`;
        elements.toggleMetronome.textContent = `節拍器: ${state.metronomeEnabled ? 'ON' : 'OFF'}`;
        elements.toggleAnswer.className = `p-3 flex items-center justify-center gap-2 font-bold border-2 transition-colors ${state.showAnswerEnabled ? 'bg-sport-yellow text-black border-white' : 'bg-sport-gray text-white/50 border-transparent'}`;
        elements.toggleAnswer.textContent = `解答: ${state.showAnswerEnabled ? 'ON' : 'OFF'}`;

        // View switching
        if (state.view === 'setup') {
          elements.setupView.classList.remove('hidden');
          elements.runningView.classList.add('hidden');
        } else {
          elements.setupView.classList.add('hidden');
          elements.runningView.classList.remove('hidden');
        }
      }

      function generateStimulus() {
        if (state.mode === 'number') {
          const num = Math.floor(Math.random() * 90) + 10;
          return {
            type: 'number',
            content: num.toString(),
            answer: num % 2 === 0 ? "拍手" : "比數字"
          };
        } else if (state.mode === 'color') {
          const colors = [
            { name: '紅', val: '#ff4757' }, { name: '橙', val: '#ffa502' },
            { name: '黃', val: '#feca57' }, { name: '綠', val: '#2ed573' },
            { name: '藍', val: '#1e90ff' }, { name: '紫', val: '#9b59b6' }
          ];
          const word = colors[Math.floor(Math.random() * colors.length)];
          const color = colors[Math.floor(Math.random() * colors.length)];
          return {
            type: 'color',
            content: word.name,
            color: color.val,
            answer: word.name !== color.name ? "拍手" : `唸${color.name}`
          };
        } else {
          const shapes = ['star', 'circle', 'square', 'triangle', 'rect', 'inv-triangle', 'diamond'];
          const colors = ['#9b59b6', '#00ff88', '#1e90ff', '#ff4757', '#ffa502', '#feca57'];
          const sShape = shapes[Math.floor(Math.random() * shapes.length)];
          const sColor = colors[Math.floor(Math.random() * colors.length)];
          
          let answer = "起始圖案";
          if (state.prevShape) {
            answer = (state.prevShape.shape === sShape || state.prevShape.color === sColor) ? "拍手" : "不拍手";
          }
          
          const svgContent = `
            <svg viewBox="0 0 180 180" class="w-full h-full max-w-[200px] md:max-w-[300px] drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]" preserveAspectRatio="xMidYMid meet">
              ${sShape === 'circle' ? `<circle cx="90" cy="90" r="75" fill="${sColor}" />` : ''}
              ${sShape === 'square' ? `<rect x="15" y="15" width="150" height="150" fill="${sColor}" />` : ''}
              ${sShape === 'triangle' ? `<polygon points="90,20 160,160 20,160" fill="${sColor}" />` : ''}
              ${sShape === 'star' ? `<polygon points="90,20 110,70 165,75 125,110 140,165 90,140 40,165 55,110 15,75 70,70" fill="${sColor}" />` : ''}
              ${sShape === 'rect' ? `<rect x="25" y="55" width="130" height="70" fill="${sColor}" />` : ''}
              ${sShape === 'inv-triangle' ? `<polygon points="20,20 160,20 90,160" fill="${sColor}" />` : ''}
              ${sShape === 'diamond' ? `<polygon points="90,20 160,90 90,160 20,90" fill="${sColor}" />` : ''}
            </svg>
          `;
          
          state.prevShape = { shape: sShape, color: sColor };
          return { type: 'shape', content: svgContent, answer };
        }
      }

      function renderStimulus(stim) {
        elements.stimulusContent.innerHTML = '';
        if (typeof stim.content === 'string' && stim.type !== 'shape') {
          const span = document.createElement('span');
          span.className = "text-[clamp(60px,20vw,180px)] font-display leading-none select-none";
          span.style.color = stim.color || 'white';
          span.textContent = stim.content;
          elements.stimulusContent.appendChild(span);
        } else {
          const div = document.createElement('div');
          div.className = "w-full h-full flex items-center justify-center";
          div.innerHTML = stim.content;
          elements.stimulusContent.appendChild(div);
        }
        
        // Handle answer
        elements.answerPopup.textContent = stim.answer;
        elements.answerPopup.classList.add('hidden');
        
        const answerDelay = Math.max(0, (state.speed * 1000) - 1000);
        setTimeout(() => {
          if (state.showAnswerEnabled && state.view === 'running') {
            elements.answerPopup.classList.remove('hidden');
            audio.playPop();
          }
        }, answerDelay);
      }

      function runStep() {
        if (state.ledIntervalId) clearInterval(state.ledIntervalId);
        if (state.stepId) clearTimeout(state.stepId);

        const stim = generateStimulus();
        state.currentStimulus = stim;
        renderStimulus(stim);

        const ledCount = Math.max(1, Math.floor(state.speed));
        elements.ledContainer.innerHTML = '';
        const leds = [];
        for (let i = 0; i < ledCount; i++) {
          const led = document.createElement('div');
          led.className = "w-6 h-6 md:w-8 md:h-8 border-2 border-[#444] bg-[#222] transition-all duration-100";
          elements.ledContainer.appendChild(led);
          leds.push(led);
        }

        let currentLed = 0;
        const tickInterval = (state.speed * 1000) / ledCount;

        const updateLeds = () => {
          if (currentLed < ledCount) {
            leds[currentLed].className = "w-6 h-6 md:w-8 md:h-8 border-2 border-white bg-sport-yellow shadow-[0_0_15px_#FFEA00,inset_0_0_5px_white]";
            audio.playTick();
            currentLed++;
          }
        };

        updateLeds();
        state.ledIntervalId = setInterval(updateLeds, tickInterval);
        state.stepId = setTimeout(runStep, state.speed * 1000);
      }

      function startTraining() {
        state.view = 'running';
        state.timeLeft = state.duration;
        state.prevShape = null;
        updateUI();

        // Instruction Text
        if (state.mode === 'number') {
          elements.instructionBanner.className = "border-4 border-white p-4 mb-4 relative min-h-[100px] flex items-center bg-sport-orange text-black";
          elements.instructionText.innerHTML = '<div>單數：左手比出十位數、右手比出個位數</div><div>雙數：拍手</div>';
        } else if (state.mode === 'color') {
          elements.instructionBanner.className = "border-4 border-white p-4 mb-4 relative min-h-[100px] flex items-center bg-red-600 text-white";
          elements.instructionText.innerHTML = '<div>字與色不同：拍手</div><div>字與色相同：念出顏色</div>';
        } else {
          elements.instructionBanner.className = "border-4 border-white p-4 mb-4 relative min-h-[100px] flex items-center bg-purple-700 text-white";
          elements.instructionText.innerHTML = '跟前一個形狀或顏色相同時拍手';
        }

        if (state.duration > 0) {
          elements.timerDisplay.textContent = formatTime(state.timeLeft);
          state.timerId = setInterval(() => {
            state.timeLeft--;
            elements.timerDisplay.textContent = formatTime(state.timeLeft);
            if (state.timeLeft <= 0) {
              stopTraining();
            }
          }, 1000);
        } else {
          elements.timerDisplay.textContent = "∞";
        }

        if (state.metronomeEnabled) {
          const mInterval = 60000 / state.metronomeBpm;
          state.metronomeIntervalId = setInterval(() => {
            audio.playTick();
          }, mInterval);
        }

        runStep();
      }

      function stopTraining() {
        if (state.timerId) clearInterval(state.timerId);
        if (state.stepId) clearTimeout(state.stepId);
        if (state.ledIntervalId) clearInterval(state.ledIntervalId);
        if (state.metronomeIntervalId) clearInterval(state.metronomeIntervalId);
        state.view = 'setup';
        updateUI();
      }

      function formatTime(seconds) {
        if (seconds <= 0) return "00:00";
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      }

      // --- Event Listeners ---
      elements.modeButtons.forEach(btn => {
        btn.onclick = () => {
          state.mode = btn.dataset.mode;
          updateUI();
        };
      });

      elements.durationSelect.onchange = (e) => {
        state.duration = Number(e.target.value);
        state.timeLeft = state.duration;
      };

      elements.speedRange.oninput = (e) => {
        state.speed = Number(e.target.value);
        updateUI();
      };

      elements.bpmRange.oninput = (e) => {
        state.metronomeBpm = Number(e.target.value);
        updateUI();
      };

      elements.toggleBgm.onclick = () => {
        state.bgmEnabled = !state.bgmEnabled;
        updateUI();
      };

      elements.toggleSfx.onclick = () => {
        state.sfxEnabled = !state.sfxEnabled;
        audio.setEnabled(state.sfxEnabled);
        updateUI();
      };

      elements.toggleMetronome.onclick = () => {
        state.metronomeEnabled = !state.metronomeEnabled;
        updateUI();
      };

      elements.toggleAnswer.onclick = () => {
        state.showAnswerEnabled = !state.showAnswerEnabled;
        updateUI();
      };

      elements.startBtn.onclick = startTraining;
      elements.stopBtn.onclick = stopTraining;

      // Initial Call
      updateUI();
    </script>
  </body>
</html>
